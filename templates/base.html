<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}WebApp SOC{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: 'Inter', sans-serif;
    }
    .glass {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
  </style>
  {% block head %}{% endblock %}
</head>

<body class="text-gray-100 min-h-screen flex flex-col">

  <!-- 🔹 Navbar -->
  <nav class="bg-slate-900/80 backdrop-blur-lg border-b border-slate-700 sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <h1 class="text-2xl font-bold tracking-wide text-blue-400">🔒 WebApp SOC</h1>
        <span class="text-xs text-gray-400 ml-2">v4.0</span>
      </div>

      <div class="hidden md:flex items-center gap-6 text-sm font-medium">
        <a href="{{ url_for('index') }}"
           class="hover:text-blue-400 transition {% if request.path == '/' %}text-blue-400 border-b-2 border-blue-400 pb-1{% endif %}">
          📊 Dashboard
        </a>
        <a href="{{ url_for('buat_event') }}"
           class="hover:text-green-400 transition {% if '/buat_event' in request.path %}text-green-400 border-b-2 border-green-400 pb-1{% endif %}">
          ✏️ Buat Event
        </a>
        <a href="{{ url_for('daftar_event') }}"
            class="hover:text-yellow-400 transition {% if '/daftar_event' in request.path %}text-yellow-400 border-b-2 border-yellow-400 pb-1{% endif %}">
            📈 Daftar Event
        </a>
        <a href="{{ url_for('dokumentasi') }}"
           class="hover:text-purple-400 transition">
          📘 Dokumentasi
        </a>
      </div>

      <!-- Toggle for mobile -->
      <button id="navToggle" class="md:hidden text-gray-300 focus:outline-none">
        ☰
      </button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden bg-slate-800 border-t border-slate-700">
      <a href="{{ url_for('index') }}" class="block px-6 py-3 hover:bg-slate-700 transition">📊 Dashboard</a>
      <a href="{{ url_for('buat_event') }}" class="block px-6 py-3 hover:bg-slate-700 transition">✏️ Buat Event</a>
      <a href="{{ url_for('daftar_event') }}" class="block px-6 py-3 hover:bg-slate-700 transition">📈 Daftar Event</a>
      <a href="{{ url_for('daftar_event') }}" class="block px-6 py-3 hover:bg-slate-700 transition">📘 Dokumentasi</a>
    </div>

    <script>
      document.getElementById('navToggle').addEventListener('click', () => {
        const menu = document.getElementById('mobileMenu');
        menu.classList.toggle('hidden');
      });
    </script>
  </nav>

  <!-- 🔹 Main Content -->
  <main class="flex-grow container mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>

  <!-- 🔹 Footer -->
  <footer class="bg-gray-900 text-gray-400 text-sm text-center py-4 border-t border-gray-800">
    &copy; {{ datetime.utcnow().year }} <span class="font-semibold text-blue-400">WebApp SOC</span> — All Rights Reserved
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
